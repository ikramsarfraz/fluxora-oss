## Disposable Postgres for the integration test suite (#241).
##
## Bound to port 5433 rather than the Postgres default so it doesn't
## collide with a contributor's local 5432. Tmpfs storage means every
## `docker compose up` starts from a clean slate — no need to worry
## about state from a previous run leaking into a new one. The
## healthcheck blocks `up --wait` until the DB is ready for connections,
## so the test runner doesn't race the boot.

services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fluxora_test
      POSTGRES_PASSWORD: fluxora_test
      POSTGRES_DB: fluxora_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fluxora_test -d fluxora_test"]
      interval: 1s
      timeout: 5s
      retries: 30
